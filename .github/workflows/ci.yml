name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.changes.outputs.backend }}
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      desktop-changed: ${{ steps.changes.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'packages/backend/**'
            frontend:
              - 'apps/web/**'
            desktop:
              - 'apps/desktop/**'

  backend:
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.backend-changed == 'true' }}
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.10"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint with Ruff
        run: uv run ruff check .
      - name: Type check with mypy
        run: uv run mypy src
      - name: Run tests
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.frontend-changed == 'true' }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  desktop:
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.desktop-changed == 'true' }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t entelekx:test .
      - name: Test Docker Compose
        run: cd docker && docker compose -f docker-compose.yml up -d --build && sleep 15 && curl -f http://127.0.0.1:7349/health
